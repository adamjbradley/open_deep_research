name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # Fast, dependency-free unit tests (no LLM/CLI/network). testpaths in
      # pyproject.toml scopes collection to tests/test_*.py.
      - name: Run unit tests
        run: uv run pytest

      - name: Validate factbase profiles
        run: uv run dossier validate
