# === PROFILE EXTENSION DRAFT for country_digital_identity.yaml - machine-generated; NOT loaded ===
# Properties below were observed during research as VALUABLE facts the production
# profile 'country_digital_identity.yaml' does not yet capture. Review/edit and MANUALLY merge the
# ones you want into the production profile. This file is never loaded at runtime.
#
# Newest proposals (rationale + confidence):
#  - coverage_by_demographic (percentage): India example (99% adults in 2024) demonstrates coverage is NOT a single number—it varies by demographic cohort and must be tracked annually. Same country/scheme can show vastly different penetration: 99% adults but 60% in rural areas, or 95% vs 70% by gender. Demographic group + year are the axes that distinguish identical facts from conflicting ones. (confidence: high)
#  - supported_authentication_modality (boolean): Complements 'biometric_capture' (what's collected at enrollment) by showing what's accepted for authentication—these differ. Many schemes collect 10 fingerprints but authenticate on 2-4; others collect iris for de-dup but accept QR for daily auth. Modality is the identity axis: whether system supports iris is distinct from whether it supports fingerprint. (confidence: high)
#  - scheme_launch_year (name_year): Year the foundational ID scheme officially launched or became operational for citizen enrollment (confidence: high)
#  - legal_recognition_status (enum): Legally mandated ≠ voluntary—affects adoption rates, population coverage, and state enforcement. Captures distinction between law-on-books and real-world requirement. Includes 'emerging' to reflect countries where scheme exists but legal basis is unclear. (confidence: high)
#  - offline_verification_capable (boolean): Critical for inclusion in low-connectivity regions. Binary infrastructure property distinguishing schemes that can serve offline-first populations. (confidence: medium)
#  - cross_border_reciprocal_agreement (boolean): Recognition is bilateral/regional: India's Aadhaar recognized in Nepal ≠ in Australia. Partner country is the identity axis; without it, 'has reciprocal agreements' conflates different political relationships. (confidence: medium)
#  - credential_validity_period (enum): Affects ongoing compliance burden, system security, and data freshness. Categorical operational parameter; renewal frequency is typically a fixed policy per scheme. (confidence: high)
#  - documented_inclusion_barrier (boolean): Not a single 'inclusion score' but specific barriers documented by research, audits, or user reports. Each barrier is distinct: literacy ≠ cost ≠ geographic access. Captures globally-observed obstacles without assuming all barriers apply everywhere. (confidence: medium)
#  - gender_marker_policy (enum): Gender policies differ globally and reflect inclusion approaches: India's third option, some European countries' self-ID, others' binary-only. No universal 'correct' answer. This enum captures real-world policy frameworks without imposing hierarchy. (confidence: high)
#  - cost_to_citizen_issuance (enum): Cost is a major inclusion barrier. Many schemes waive fees for vulnerable populations. Category qualifiers allow nuance: 'free for all' ≠ 'free for elderly, paid for working adults' ≠ 'sliding scale by income'. Without category, a single fact conflates different equity structures. (confidence: high)
#
entity_type: country
properties:
- name: id_coverage_by_demographic
  kind: percentage
  description: Percentage of a specified demographic group holding valid national
    ID
  identity_qualifiers:
  - demographic_segment
  - year
  required_qualifiers:
  - demographic_segment
  qualifier_enums:
    demographic_segment:
    - adults_18_to_65
    - children_under_18
    - seniors_over_65
    - urban_residents
    - rural_residents
    - indigenous_populations
    - migrant_workers
    - refugees_and_asylum_seekers
    - economically_disadvantaged
    - persons_with_disabilities
    - religious_minorities
    - linguistic_minorities
    - stateless_or_undocumented
    - nomadic_or_semi_nomadic_populations
    year:
    - '2020'
    - '2021'
    - '2022'
    - '2023'
    - '2024'
    - '2025'
