# Newest proposals (rationale + confidence):
#  - interoperability_platform_name (name): The official or commercial name of the nationwide data exchange or interoperability platform (e.g., X-Road in Estonia) that connects disparate government databases and public/private service provider information systems. (confidence: high)
#  - electronic_voting_status (enum): Allows classification of how deeply the digital ID is integrated into democratic sovereignty, distinguishing countries with full e-voting access from those with limited pilots or legal prohibitions. (confidence: high)
#  - digital_signature_legal_recognition (enum): Digital signature legal weight varies globally. Distinguishing between QES (legally equivalent to handwritten signatures) and lesser forms is crucial for evaluating e-commerce and legal interoperability. (confidence: high)
#  - authentication_channel_status (enum): A single country (like Estonia) often supports multiple authentication form factors concurrently (e.g., smart cards, SIM-based Mobile-ID, and app-based Smart-ID), each with its own lifecycle status. Qualifying by channel_medium allows tracking these distinct channels. (confidence: high)
#  - national_personal_identifier_name (name): The native or official term for the unique numeric or alphanumeric code assigned to citizens/residents (e.g., Isikukood in Estonia) that serves as the root key for digital identity lookup. (confidence: high)
#
