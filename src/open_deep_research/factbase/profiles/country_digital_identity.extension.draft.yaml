  description: Describes the architectural approach for data storage and management
    within the national digital identity system.
  value_enum:
  - centralized
  - decentralized
  - federated
  - hybrid
  - distributed
- name: digital_signature_widespread_use
  kind: boolean
  description: Indicates if digital signatures are widely used and legally recognized
    for various transactions.
- name: data_access_audit_trail_enabled
  kind: boolean
  description: Indicates if individuals can view an audit trail of who has accessed
    their personal data and when.
- name: cross_border_id_recognition_eu
  kind: enum
  description: Status of cross-border recognition of digital identities and signatures
    within the EU framework (eIDAS).
  value_enum:
  - eIDAS_adopted
  - eIDAS_planned
  - none
- name: mandatory_id_possession
  kind: boolean
  description: Indicates if it is mandatory for residents and permanent aliens to
    possess an identity document.
- name: digital_id_use_cases
  kind: enum
  description: List of key functionalities and services enabled by the national digital
    identity scheme, encompassing both public and private sector interactions.
  value_enum:
  - voting_online
  - document_signing
  - healthcare_access
  - banking_access
  - business_registration
  - e_commerce
  - travel_id
  - tax_filing
- name: e_residency_available
  kind: boolean
  description: True if the country offers a program allowing non-residents to obtain
    a digital identity for accessing its e-services and business environment (e.g.,
    Estonia's e-Residency).
- name: data_exchange_architecture
  kind: enum
  description: The architectural paradigm employed for secure data sharing across
    government departments and other authorized entities (e.g., centralized, decentralized,
    federated, hybrid).
  value_enum:
  - centralized
  - decentralized
  - federated
  - hybrid
  - distributed_ledger
- name: digital_signature_legally_binding
  kind: boolean
  description: True if digital signatures performed using the national digital identity
    system are recognized by law as having equivalent legal validity to traditional
    handwritten signatures.
- name: economic_impact_gdp_projection_pct
  kind: percentage
  description: The estimated or projected percentage increase in the country's Gross
    Domestic Product (GDP) by a given year, directly linked to the adoption and utilization
    of its national digital identity scheme.
  identity_qualifiers:
  - year
  required_qualifiers:
  - year
  qualifier_enums:
    year:
    - '2030'
    - '2025'
    - '2040'
- name: personal_data_access_audit_trail
  kind: boolean
  description: True if the digital identity system provides individuals with the ability
    to review logs or an audit trail of who has accessed their personal data, when,
    and for what purpose.
- name: digital_signature_legally_recognized
  kind: boolean
  description: Whether digital signatures are legally recognized and have legal effect
    equivalent to handwritten signatures.
- name: eidas_regulation_adopted
  kind: boolean
  description: Whether the country has adopted and implemented the EU eIDAS Regulation
    (Regulation (EU) No 910/2014) for electronic identification and trust services.
- name: digital_id_mechanisms_available
  kind: enum
  description: Types of official digital identification documents or tools available
