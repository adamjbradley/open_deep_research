# === PROFILE EXTENSION DRAFT for country_digital_identity.yaml - machine-generated; NOT loaded ===
# Properties below were observed during research as VALUABLE facts the production
# profile 'country_digital_identity.yaml' does not yet capture. Review/edit and MANUALLY merge the
# ones you want into the production profile. This file is never loaded at runtime.
#
# Newest proposals (rationale + confidence):
#  - adult_coverage_pct (percentage): Coverage varies by year (time series tracking), age cohort (structural differences in enrollment), and counting basis (de facto residents vs. citizens vs. those theoretically eligible). India's 99% in 2024 is almost certainly 'adults_all' and 'de_facto'—must capture this variance. (confidence: high)
#  - authentication_method_supported (enum): Authentication methods differ from biometric capture: a country may capture fingerprints but only support PIN auth (offline); or capture face but enable both biometric and QR auth via different channels. Sector context matters because capabilities often rolled out unevenly (e.g., government services first, then financial). Year_enabled tracks rollout sequence. This is globally critical: India uses OTP + biometric; Kenya uses USSD + biometric; Nigeria's NIN uses PIN primarily. (confidence: high)
#  - kyc_linkage_financial (boolean): KYC linkage is a material fact for financial inclusion, surveillance risk, and anti-money-laundering compliance. It's distinct from whether the ID *can* be used (many IDs can be voluntarily provided); linkage means institutions require it or regulators mandate it. This varies by jurisdiction: India's Aadhaar is legally linked to financial KYC (mandatory by RBI); Kenya's ID is used but not legally mandated for all accounts. Mandate type captures nuance (law vs. industry practice). (confidence: high)
#  - digital_wallet_integration (boolean): Digital wallets (e.g., mDL, digital driver licenses, credential wallets) are the frontier of digital ID deployment. True offline capability is distinct from claims—some wallets require a live check even at the point of use. This reflects global trends: India exploring DigiLocker; EU's eIDAS 2.0 mandates interoperable wallets; South Africa's mDL pilot. Year_launched and platform_name enable tracking evolution and interop. (confidence: low)
#  - data_minimization_requirement (boolean): Data minimization is a privacy governance frontier distinct from consent/access policy. It captures whether a resident can prove 'I am over 18' without revealing birth date, or 'I am a citizen' without revealing address. This is foundational for digital equity (reducing re-identification risk for vulnerable populations). Most existing schemes (India, Kenya) lack this; it's emerging in EU frameworks. Enforcement type ranges from aspirational (policy document) to architectural (verifiable credentials). (confidence: low)
#  - deduplication_linkage_scope (enum): Deduplication scope determines inclusivity (can one person game multiple IDs?) and surveillance reach (is one ID tracked across borders?). This is materially different from coverage or enrollment modality. India's Aadhaar has internal dedup + passport linkage but not international pools (as of 2024); many African schemes are exploring regional biometric sharing. Year matters because these linkages evolve. (confidence: medium)
#  - revocation_suspension_mechanism (enum): Revocation is a trust-critical property. Schemes without formal revocation enable identity theft and abuse; schemes with only administrative revocation may lock out residents wrongly. India has administrative + judicial + voluntary; Estonia has strong revocation; many low-income schemes lack clear mechanisms. This is foundational for the living dossier's data integrity (can you trust a fact about a deceased person?). (confidence: medium)
#  - financial_inclusion_lift_estimated (percentage): Financial inclusion impact is a key outcome claim but poorly measured globally. Most published estimates are self-reported by governments or industry (low confidence); RCTs are rare. This property separates evidence quality via study_type, enabling researchers to query high-confidence findings only. Needed to fact-check living-dossier claims about ID impact. (confidence: low)
#
